<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamic Tax Invoice</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Overlay Styles */
    #loginOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    .login-box input {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    
    /* Logout Button Styling */
    #logoutBtn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }

    /* Hide workspace by default */
    #mainWorkspace { display: none; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2 style="margin-top:0">System Login</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="checkLogin()">Login</button>
      <p id="errorMsg" style="color: red; display: none; font-size: 14px;">Invalid credentials!</p>
    </div>
  </div>

  <!-- Workspace Section -->
  <main id="mainWorkspace" class="workspace">
    <aside class="editor" aria-label="Invoice editor">
      <div class="editor-header">
        <div>
          <h1>Tax Invoice</h1>
          <p>Edit the values, add rows, then print.</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button id="printBtn" type="button">Print</button>
          <!-- Logout Button Added Here -->
          <button id="logoutBtn" onclick="handleLogout()">Logout</button>
        </div>
      </div>

      <!-- ... (Rest of your existing sections: Customer, Items, etc.) ... -->
      <section class="editor-section">
        <h2>Customer</h2>
        <label>Customer name <input id="customerName" type="text"></label>
        <label>Customer address <input id="customerAddress" type="text"></label>
        <label>Customer GSTIN <input id="customerGstin" type="text"></label>
        <label>GSTIN <input id="invoiceGstin" type="text"></label>
        <label>Bill no <input id="billNo" type="text"></label>
        <label>Bill date <input id="billDate" type="date"></label>
      </section>

      <section class="editor-section">
        <div class="section-title">
          <h2>Items</h2>
          <button id="addRowBtn" type="button">Add Row</button>
        </div>
        <div id="itemEditor" class="item-editor"></div>
      </section>
    </aside>

    <section class="paper-wrap" aria-label="Invoice preview">
        <!-- (Keep your existing Article/Invoice Preview content here) -->
        <article id="invoice" class="invoice-page">
            <div class="title-box">TAX INVOICE</div>
            <!-- ... (The rest of your invoice HTML) ... -->
        </article>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    // --- AUTH LOGIC ---

    // 1. Check if user is already logged in on Page Load
    window.onload = function() {
      const isLoggedIn = localStorage.getItem("isLoggedIn");
      if (isLoggedIn === "true") {
        showContent();
      }
    };

    // 2. Login Function
    function checkLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const error = document.getElementById('errorMsg');

      if (u === "admin" && p === "123") {
        // Save state to localStorage
        localStorage.setItem("isLoggedIn", "true");
        showContent();
      } else {
        error.style.display = 'block';
      }
    }

    // 3. Logout Function
    function handleLogout() {
      localStorage.removeItem("isLoggedIn"); // Clear the saved state
      location.reload(); // Refresh the page to show login screen
    }

    // Helper to show the app
    function showContent() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainWorkspace').style.display = 'flex';
    }
  </script>
</body>
</html>
